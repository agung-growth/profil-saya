<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Kelola Blog</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.css" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                    },
                    colors: {
                        natural: {
                            base: '#2C4A3E',
                            blue: '#4A6B82',
                            cream: '#FBFBFA',
                            clay: '#F4F3EF',
                            muted: '#6B7A74'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-natural-clay/40 text-natural-base font-sans antialiased min-h-screen">

    <nav class="bg-white border-b border-natural-base/10 sticky top-0 z-40">
        <div class="container mx-auto max-w-6xl px-6 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <span class="text-xl">🛠️</span>
                <span class="font-extrabold text-natural-base tracking-tight">Admin CMS Dashboard</span>
            </div>
            <a href="index.html" class="text-sm font-bold text-natural-blue hover:underline inline-flex items-center gap-1">
                <i class="bi bi-arrow-left"></i> Lihat Website
            </a>
        </div>
    </nav>

    <main class="container mx-auto max-w-6xl px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <section class="lg:col-span-5 bg-white p-6 rounded-3xl border border-natural-base/10 shadow-sm space-y-6">
                <div>
                    <h2 id="form-title" class="text-xl font-extrabold text-natural-base">Buat Artikel Baru</h2>
                    <p class="text-xs text-natural-muted mt-1">Isi formulir di bawah untuk mempublikasikan tulisan baru.</p>
                </div>

                <form id="blog-form" class="space-y-4">
                    <input type="hidden" id="post-id">

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-natural-muted mb-1.5" for="post-title">Judul Artikel</label>
                        <input type="text" id="post-title" required class="w-full bg-natural-clay/40 border border-natural-base/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-natural-blue font-medium" placeholder="Masukkan judul menarik...">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-natural-muted mb-1.5" for="post-category">Kategori</label>
                            <input type="text" id="post-category" required class="w-full bg-natural-clay/40 border border-natural-base/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-natural-blue font-medium" placeholder="Contoh: AI, PR, Marketing">
                        </div>
                        <div>
                            <label class="block text-xs font-bold uppercase tracking-wider text-natural-muted mb-1.5" for="post-date">Tanggal</label>
                            <input type="text" id="post-date" required class="w-full bg-natural-clay/40 border border-natural-base/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-natural-blue font-medium" placeholder="Contoh: 19 Juni 2026">
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-natural-muted mb-1.5">Gambar Cover Artikel</label>
                        <div class="flex items-center gap-4">
                            <label class="flex flex-col items-center justify-center border-2 border-dashed border-natural-base/20 rounded-xl p-4 bg-natural-clay/10 cursor-pointer hover:bg-natural-clay/30 hover:border-natural-blue transition-all group w-full text-center">
                                <i class="bi bi-image text-2xl text-natural-muted group-hover:text-natural-blue"></i>
                                <span class="text-xs font-bold text-natural-muted group-hover:text-natural-blue mt-1" id="upload-label">Pilih File Gambar</span>
                                <input type="file" id="post-image-file" accept="image/*" class="hidden">
                            </label>
                        </div>
                        <div id="image-preview-container" class="mt-3 hidden bg-natural-clay/30 border border-natural-base/10 rounded-xl p-2 flex items-center justify-between">
                            <img id="image-preview" src="" class="h-14 w-24 object-cover rounded-lg border border-natural-base/10 bg-white">
                            <button type="button" id="remove-image-btn" class="text-red-500 hover:text-red-700 text-sm font-bold mr-2">Hapus</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-natural-muted mb-1.5">Konten Artikel</label>
                        
                        <div class="bg-natural-clay border border-natural-base/10 rounded-t-xl p-2 flex flex-wrap gap-1 items-center border-b-0 select-none">
                            <button type="button" onclick="formatDoc('bold')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Tebal (Bold)"><i class="bi bi-type-bold font-bold"></i></button>
                            <button type="button" onclick="formatDoc('italic')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Miring (Italic)"><i class="bi bi-type-italic"></i></button>
                            <button type="button" onclick="formatDoc('underline')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Garis Bawah (Underline)"><i class="bi bi-type-underline"></i></button>
                            
                            <div class="w-[1px] h-5 bg-natural-base/20 mx-1"></div>
                            
                            <button type="button" onclick="formatDoc('justifyLeft')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Rata Kiri"><i class="bi bi-text-left"></i></button>
                            <button type="button" onclick="formatDoc('justifyCenter')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Rata Tengah"><i class="bi bi-text-center"></i></button>
                            <button type="button" onclick="formatDoc('justifyRight')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Rata Kanan"><i class="bi bi-text-right"></i></button>
                            <button type="button" onclick="formatDoc('justifyFull')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Rata Kiri Kanan (Justify)"><i class="bi bi-justify"></i></button>
                            
                            <div class="w-[1px] h-5 bg-natural-base/20 mx-1"></div>

                            <button type="button" onclick="formatDoc('insertUnorderedList')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Daftar Poin (Bullet List)"><i class="bi bi-list-ul"></i></button>
                            <button type="button" onclick="formatDoc('insertOrderedList')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-white border border-transparent hover:border-natural-base/10 text-sm" title="Daftar Angka (Numbered List)"><i class="bi bi-list-ol"></i></button>
                        </div>

                        <div id="post-editor" contenteditable="true" class="w-full bg-white border border-natural-base/10 rounded-b-xl px-4 py-3 text-sm focus:outline-none focus:border-natural-blue font-medium min-h-[220px] max-h-[400px] overflow-y-auto prose prose-sm focus:ring-0" placeholder="Tuliskan isi artikel secara lengkap disini..."></div>
                    </div>

                    <div class="flex gap-2 pt-2">
                        <button type="submit" id="submit-btn" class="flex-grow py-3 bg-natural-base text-white text-sm font-bold rounded-xl hover:bg-natural-blue transition-all shadow-sm">
                            <i class="bi bi-check-circle mr-1"></i> Simpan Artikel
                        </button>
                        <button type="button" id="cancel-btn" class="hidden px-4 py-3 bg-gray-200 text-gray-700 text-sm font-bold rounded-xl hover:bg-gray-300 transition-all">
                            Batal
                        </button>
                    </div>
                </form>
            </section>

            <section class="lg:col-span-7 bg-white p-6 rounded-3xl border border-natural-base/10 shadow-sm space-y-6">
                <div>
                    <h2 class="text-xl font-extrabold text-natural-base">Daftar Artikel</h2>
                    <p class="text-xs text-natural-muted mt-1">Daftar seluruh artikel yang tersimpan pada database lokal saat ini.</p>
                </div>

                <div id="admin-blog-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-2">
                    </div>
            </section>

        </div>
    </main>

    <script>
        const defaultPosts = [
            {
                id: 1,
                title: "Pemanfaatan Artificial Intelligence dalam Dunia Pendidikan Modern",
                category: "AI & Edukasi",
                date: "19 Juni 2026",
                image: "gb4.JPG",
                content: "Artificial Intelligence (AI) bukan lagi masa depan, melainkan masa kini. Dalam pilar pendidikan, machine learning membantu dosen mendeteksi preferensi belajar mahasiswa, mengotomatisasi penilaian, dan memberikan materi yang dipersonalisasi. Implementasi AI yang tepat dapat melahirkan ekosistem belajar yang adaptif dan inklusif."
            },
            {
                id: 2,
                title: "Strategi Public Relations Mengoptimalkan Citra Perguruan Tinggi",
                category: "Public Relations",
                date: "10 Mei 2026",
                image: "gb9.JPG",
                content: "Membangun kepercayaan publik di era digital menuntut PR untuk adaptif mengolah data tren media sosial. Menggabungkan teknik digital marketing communication dengan konten edukasi organik terbukti meningkatkan conversion rate penerimaan mahasiswa baru secara signifikan."
            }
        ];

        if (!localStorage.getItem('agung_blog_posts')) {
            localStorage.setItem('agung_blog_posts', JSON.stringify(defaultPosts));
        }

        // DOM Elements
        const blogForm = document.getElementById('blog-form');
        const postIdInput = document.getElementById('post-id');
        const postTitleInput = document.getElementById('post-title');
        const postCategoryInput = document.getElementById('post-category');
        const postDateInput = document.getElementById('post-date');
        
        // Target Elemen Editor teks terbaru
        const postEditor = document.getElementById('post-editor');
        
        const postImageFileInput = document.getElementById('post-image-file');
        const uploadLabel = document.getElementById('upload-label');
        const imagePreviewContainer = document.getElementById('image-preview-container');
        const imagePreview = document.getElementById('image-preview');
        const removeImageBtn = document.getElementById('remove-image-btn');

        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const adminBlogList = document.getElementById('admin-blog-list');

        let currentImageBase64 = "";

        // Fungsi API Pengendali Format Teks Editor (Blogger Style)
        function formatDoc(cmd, value = null) {
            document.execCommand(cmd, false, value);
            postEditor.focus(); // Jaga agar kursor tetap aktif di dalam teks editor
        }

        // Logika membaca berkas gambar
        postImageFileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                if (file.size > 2 * 1024 * 1024) {
                    alert("Ukuran file terlalu besar! Maksimal adalah 2MB agar pas di memori lokal browser.");
                    this.value = "";
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImageBase64 = event.target.result;
                    showImagePreview(currentImageBase64, file.name);
                };
                reader.readAsDataURL(file);
            }
        });

        function showImagePreview(src, filename) {
            imagePreview.src = src;
            uploadLabel.innerText = filename ? filename : "Gambar Terpilih";
            imagePreviewContainer.classList.remove('hidden');
        }

        removeImageBtn.addEventListener('click', function() {
            currentImageBase64 = "";
            postImageFileInput.value = "";
            uploadLabel.innerText = "Pilih File Gambar";
            imagePreviewContainer.classList.add('hidden');
            imagePreview.src = "";
        });

        // Merender list artikel
        function renderAdminList() {
            const posts = JSON.parse(localStorage.getItem('agung_blog_posts')) || [];
            adminBlogList.innerHTML = "";

            if (posts.length === 0) {
                adminBlogList.innerHTML = `<p class="text-sm text-center text-natural-muted py-8 bg-natural-clay/20 rounded-2xl">Tidak ada artikel di database.</p>`;
                return;
            }

            [...posts].reverse().forEach(post => {
                const cover = post.image ? post.image : 'https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=500';
                const div = document.createElement('div');
                div.className = "flex gap-4 p-4 border border-natural-base/10 bg-natural-clay/10 rounded-2xl items-center justify-between";
                
                div.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0">
                        <img src="${cover}" class="w-16 h-12 rounded-lg object-cover border border-natural-base/10 flex-shrink-0 bg-white" onerror="this.src='https://images.unsplash.com/photo-1434030216411-0b793f4b4173?w=500'">
                        <div class="min-w-0">
                            <h4 class="font-bold text-natural-base text-sm truncate">${post.title}</h4>
                            <p class="text-xs text-natural-muted mt-0.5">${post.category} • ${post.date}</p>
                        </div>
                    </div>
                    <div class="flex gap-1 flex-shrink-0">
                        <button onclick="editPost(${post.id})" class="w-8 h-8 flex items-center justify-center text-natural-blue hover:bg-natural-blue/10 rounded-lg" title="Edit"><i class="bi bi-pencil-square"></i></button>
                        <button onclick="deletePost(${post.id})" class="w-8 h-8 flex items-center justify-center text-red-500 hover:bg-red-50/80 rounded-lg" title="Hapus"><i class="bi bi-trash3"></i></button>
                    </div>
                `;
                adminBlogList.appendChild(div);
            });
        }

        // Submit Form (Tambah atau Edit)
        blogForm.addEventListener('submit', function(e) {
            e.preventDefault();

            // Validasi teks editor agar tidak kosong kosong amat
            if(postEditor.innerHTML.trim() === "" || postEditor.innerHTML === "<br>") {
                alert("Konten artikel tidak boleh kosong!");
                return;
            }

            const posts = JSON.parse(localStorage.getItem('agung_blog_posts')) || [];
            const id = postIdInput.value;

            if (id) {
                const index = posts.findIndex(p => p.id == id);
                if (index !== -1) {
                    posts[index].title = postTitleInput.value;
                    posts[index].category = postCategoryInput.value;
                    posts[index].date = postDateInput.value;
                    // Simpan markup HTML hasil format editor
                    posts[index].content = postEditor.innerHTML;
                    
                    if (currentImageBase64) {
                        posts[index].image = currentImageBase64;
                    }
                }
            } else {
                const newPost = {
                    id: Date.now(),
                    title: postTitleInput.value,
                    category: postCategoryInput.value,
                    date: postDateInput.value,
                    content: postEditor.innerHTML, // Simpan rich text markup HTML
                    image: currentImageBase64 || ""
                };
                posts.push(newPost);
            }

            localStorage.setItem('agung_blog_posts', JSON.stringify(posts));
            resetForm();
            renderAdminList();
            window.dispatchEvent(new Event('storage'));
        });

        // Trigger Masuk Mode Edit Artikel
        window.editPost = function(id) {
            const posts = JSON.parse(localStorage.getItem('agung_blog_posts')) || [];
            const post = posts.find(p => p.id == id);

            if (post) {
                formTitle.innerText = "Edit Artikel";
                postIdInput.value = post.id;
                postTitleInput.value = post.title;
                postCategoryInput.value = post.category;
                postDateInput.value = post.date;
                
                // Masukkan teks ber-HTML ke editor teks
                postEditor.innerHTML = post.content;

                if (post.image) {
                    currentImageBase64 = post.image;
                    if (post.image.startsWith('data:')) {
                        showImagePreview(post.image, "Gambar Tersimpan (Base64)");
                    } else {
                        showImagePreview(post.image, post.image);
                    }
                } else {
                    currentImageBase64 = "";
                    imagePreviewContainer.classList.add('hidden');
                    uploadLabel.innerText = "Pilih File Gambar";
                }

                submitBtn.innerHTML = `<i class="bi bi-save mr-1"></i> Perbarui Artikel`;
                cancelBtn.classList.remove('hidden');
                blogForm.scrollIntoView({ behavior: 'smooth' });
            }
        };

        window.deletePost = function(id) {
            if (confirm("Apakah Anda yakin ingin menghapus artikel ini?")) {
                let posts = JSON.parse(localStorage.getItem('agung_blog_posts')) || [];
                posts = posts.filter(p => p.id != id);
                localStorage.setItem('agung_blog_posts', JSON.stringify(posts));
                
                if (postIdInput.value == id) {
                    resetForm();
                }
                renderAdminList();
                window.dispatchEvent(new Event('storage'));
            }
        };

        function resetForm() {
            formTitle.innerText = "Buat Artikel Baru";
            postIdInput.value = "";
            blogForm.reset();
            
            // Bersihkan teks editor
            postEditor.innerHTML = "";
            
            currentImageBase64 = "";
            imagePreviewContainer.classList.add('hidden');
            imagePreview.src = "";
            uploadLabel.innerText = "Pilih File Gambar";

            submitBtn.innerHTML = `<i class="bi bi-check-circle mr-1"></i> Simpan Artikel`;
            cancelBtn.classList.add('hidden');
        }

        cancelBtn.addEventListener('click', resetForm);
        window.onload = renderAdminList;
    </script>
</body>
</html>
